<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rodrigo Aguilera</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
    }

    header {
      padding: 40px;
      text-align: center;
      background: #111827;
    }

    h1 {
      margin: 0;
      font-size: 32px;
    }

    p {
      opacity: 0.8;
    }

    main {
      padding: 40px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #1f2937;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Rodrigo Aguilera</h1>
    <p>Warehouse Operations Manager</p>
  </header>

  <main>

    <div class="card">
      <h2>Sobre</h2>
      <p>Experiência em gestão de operações logísticas, liderando supervisores, líderes e mais de 300 operadores.</p>
    </div>

    <div class="card">
      <h2>Experiência</h2>
      <p>Gestão de operações em warehouse, foco em produtividade, qualidade e controle de indicadores.</p>
    </div>

  </main>

</body>
</html>
